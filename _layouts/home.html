---
layout: default
---

{%- if page.title -%}
  <h1>{{ page.title }}</h1>
{%- endif -%}

{{ content }}

{%- if site.posts.size > 0 -%}
  <article>
    {%- for post in site.posts -%}
      <h2><a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a></h2>
        {{ post.excerpt }}
    {%- endfor -%}
  </article>
{%- else -%}
  <p>I haven't written anything yet...</p>
{%- endif -%}
